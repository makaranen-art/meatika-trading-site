<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Center — Meatika Trading</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#0a0508; --ink-800:#1c1116; --ink-700:#2a1b21; --ink-600:#4a2a35;
    --bg-grad-end:#2b0313; --gold-500:#ff2f5f; --gold-300:#ff8fa8;
    --green-500:#c9b3ba; --green-300:#efe3e6; --up:#ff5577;
    --paper:#f5eef0; --muted:#b99aa3; --radius:16px; --maxw:480px;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
    --glass-1-border:rgba(255,255,255,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(255,30,80,0.40), rgba(90,8,32,0.30));
    --glass-2-border:rgba(255,70,110,0.45);
    --glass-3-bg:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
    --glass-3-border:rgba(255,255,255,0.22);
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body.light{
    --ink-900:#fdf3f5; --ink-800:#ffffff; --ink-700:#fbeef1; --ink-600:#f0d3da;
    --bg-grad-end:#fdf3f5; --paper:#2a0f16; --muted:#8a6670;
    --gold-300:#c81b4a; --green-500:#8a6670; --green-300:#5c3c44;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
    --glass-1-border:rgba(42,15,22,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(255,30,85,0.16), rgba(255,30,85,0.06));
    --glass-2-border:rgba(200,27,74,0.35);
    --glass-3-bg:linear-gradient(135deg, rgba(230,205,210,0.55), rgba(255,255,255,0.30));
    --glass-3-border:rgba(42,15,22,0.14);
  }
  body{
    background:
      radial-gradient(circle at 20% -10%, rgba(255,20,80,0.20), transparent 45%),
      radial-gradient(circle at 100% 15%, rgba(255,60,110,0.14), transparent 42%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 32px),
      linear-gradient(180deg, var(--ink-900) 0%, var(--bg-grad-end) 100%);
    color:var(--paper); font-family:'Inter', system-ui, sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  body.km, body.km *{ font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif !important; }
  ::selection{ background:var(--gold-500); color:var(--ink-900); }

  .ticker-wrap{ width:100%; background:var(--ink-800); border-bottom:1px solid var(--ink-600); overflow:hidden; white-space:nowrap; padding:8px 0; }
  .ticker{ display:inline-flex; animation:scroll 28s linear infinite; font-family:'JetBrains Mono', monospace; font-size:12.5px; letter-spacing:0.02em; }
  .ticker span{ padding:0 22px; color:var(--muted); display:inline-flex; align-items:center; gap:8px; }
  .ticker span b{ color:var(--gold-300); font-weight:600; }
  .ticker .up{ color:var(--up); }
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .ticker{ animation:none; } }

  /* ---- Page load + scroll-reveal animations ---- */
  @keyframes mthPageIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  body{ animation:mthPageIn .6s cubic-bezier(.16,1,.3,1) both; }
  .reveal{
    opacity:0;
    transform:translateY(26px) scale(.97);
    transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    will-change:opacity, transform;
  }
  .reveal.is-visible{ opacity:1; transform:translateY(0) scale(1); }
  @media (prefers-reduced-motion: reduce){
    body{ animation:none; }
    .reveal, .reveal.is-visible{ opacity:1 !important; transform:none !important; transition:none !important; }
  }

  .page{ width:100%; max-width:var(--maxw); padding:22px 18px 40px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:26px; }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:34px; height:34px; border-radius:10px; background:var(--ink-800); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s ease; text-decoration:none;
  }
  .icon-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .icon-btn svg{ width:16px; height:16px; }
  .lang-btn{ width:auto; padding:0 9px; font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:0.03em; }
  .back-btn{ width:auto; padding:0 12px; gap:6px; font-size:12.5px; font-weight:600; }

  .hero{ text-align:center; margin-bottom:26px; }
  .page-title{ font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700; margin:0 0 8px; color:var(--paper); }
  .hero p{ color:var(--muted); font-size:13.5px; line-height:1.6; margin:0 auto; max-width:340px; }

  .format-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:-6px 0 24px; }
  .format-card{ display:flex; flex-direction:column; gap:8px; padding:13px; border-radius:var(--radius); text-decoration:none; color:var(--paper); background:var(--glass-1-bg); border:1px solid var(--glass-1-border); box-shadow:0 8px 24px rgba(0,0,0,.22); transition:.18s ease; }
  .format-card:hover{ transform:translateY(-2px); border-color:var(--gold-500); }
  .format-icon{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; }
  .format-icon svg{ width:18px; height:18px; }
  .format-card h2{ font-family:'Space Grotesk',sans-serif; font-size:14px; margin:0; }
  .format-card p{ font-size:11.5px; line-height:1.45; color:var(--muted); margin:0; }

  .logo-mark{
    width:100%; max-width:200px; margin:0 auto 14px;
    display:flex; align-items:center; justify-content:center;
    position:relative; padding:8px 6px;
    background:radial-gradient(circle, rgba(255,45,95,0.18), transparent 70%);
    border-radius:16px;
  }
  .logo-img{ width:100%; height:auto; display:block; filter:drop-shadow(0 6px 18px rgba(255,45,95,0.30)); }

  /* ---- Topic filter: triple-line icon button (in the topbar) + side drawer ---- */
  .tag-fab{ position:relative; width:auto; padding:0 11px 0 10px; gap:6px; font-size:11.5px; font-weight:600; letter-spacing:0.03em; font-family:'JetBrains Mono', monospace; }
  body.km .tag-fab{ font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif; }

  .tag-drawer-backdrop{
    position:fixed; inset:0; z-index:70; background:rgba(10,5,8,0.6);
    backdrop-filter:blur(6px) saturate(140%); -webkit-backdrop-filter:blur(6px) saturate(140%);
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .tag-drawer-backdrop.is-open{ opacity:1; pointer-events:auto; }

  .tag-drawer{
    position:fixed; top:0; right:0; height:100%; width:min(78vw, 300px); z-index:71;
    background:var(--glass-2-bg); border-left:1px solid var(--glass-2-border);
    backdrop-filter:blur(20px) saturate(150%); -webkit-backdrop-filter:blur(20px) saturate(150%);
    box-shadow:-14px 0 40px rgba(0,0,0,0.4);
    transform:translateX(100%); transition:transform .28s cubic-bezier(.16,1,.3,1);
    display:flex; flex-direction:column; padding:22px 16px;
  }
  .tag-drawer.is-open{ transform:translateX(0); }
  .tag-drawer-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14.5px; color:var(--paper);
  }
  body.km .tag-drawer-head{ font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif; }
  .tag-drawer-close{
    width:28px; height:28px; border-radius:8px; border:1px solid var(--ink-600); background:var(--ink-800);
    color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; line-height:1;
  }
  .tag-drawer-close:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .tag-drawer-list{ display:flex; flex-direction:column; gap:8px; }
  .tag-item{
    text-align:left; padding:12px 14px; border-radius:12px; border:1px solid var(--ink-600); background:var(--ink-800);
    color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:600; letter-spacing:0.03em;
    cursor:pointer; transition:.15s ease;
  }
  body.km .tag-item{ font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif; }
  .tag-item:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .tag-item.is-active{ background:linear-gradient(135deg, var(--gold-500), var(--gold-300)); border-color:transparent; color:var(--ink-900); }

  .news-cat-tag{
    font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase;
    color:var(--gold-300); background:rgba(255,143,168,0.14); border:1px solid var(--glass-1-border);
    padding:1px 7px; border-radius:5px; font-weight:700;
  }

  /* ---- Pager (footer page numbers), shown once a filtered list needs more than one page ---- */
  .news-pager{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    margin-top:22px; padding-top:18px; border-top:1px solid var(--ink-600);
  }
  .page-btn{
    min-width:34px; height:34px; padding:0 6px; border-radius:9px; border:1px solid var(--ink-600); background:var(--ink-800);
    color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700; cursor:pointer; transition:.15s ease;
  }
  .page-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .page-btn.is-active{ background:linear-gradient(135deg, var(--gold-500), var(--gold-300)); border-color:transparent; color:var(--ink-900); }

  .news-grid{ display:flex; flex-direction:column; gap:14px; }
  .news-card{
    display:flex; gap:12px; background:var(--glass-1-bg); border:1px solid var(--glass-1-border);
    backdrop-filter:blur(16px) saturate(140%); -webkit-backdrop-filter:blur(16px) saturate(140%);
    box-shadow:0 8px 24px rgba(0,0,0,0.22);
    border-radius:var(--radius); padding:12px; text-decoration:none; color:inherit; transition:.18s ease;
  }
  .news-grid .news-card:nth-child(3n+2){ background:var(--glass-2-bg); border-color:var(--glass-2-border); }
  .news-grid .news-card:nth-child(3n){ background:var(--glass-3-bg); border-color:var(--glass-3-border); }
  .news-card:hover{ border-color:var(--gold-500); transform:translateY(-2px); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
  .news-thumb{
    width:96px; height:96px; flex-shrink:0; border-radius:12px; background-size:cover; background-position:center;
    background-color:var(--ink-700);
  }
  .news-thumb-empty{ display:flex; align-items:center; justify-content:center; color:var(--muted); }
  .news-thumb-empty svg{ width:26px; height:26px; }
  .news-card-body{ min-width:0; display:flex; flex-direction:column; justify-content:center; gap:4px; }
  .news-meta{ display:flex; align-items:center; gap:8px; }
  .news-date{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--gold-300); letter-spacing:0.04em; }
  .news-draft-tag{ font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:0.06em; color:var(--ink-900); background:var(--gold-300); padding:1px 6px; border-radius:5px; font-weight:700; }
  .news-card-body h3{ font-family:'Space Grotesk', sans-serif; font-size:14.5px; font-weight:600; margin:0; color:var(--paper); }
  .news-card-body p{ font-size:12px; color:var(--muted); line-height:1.5; margin:0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  footer{ text-align:center; margin-top:26px; font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:0.08em; color:var(--ink-600); text-transform:uppercase; }
  .not-found{ text-align:center; color:var(--muted); font-size:13.5px; padding:40px 10px; }

  /* ---- Access gate: registration form shown before News & Articles content ---- */
  body.gate-open{ overflow:hidden; }
  .access-gate{
    position:fixed; inset:0; z-index:999; display:flex; align-items:center; justify-content:center;
    padding:22px 18px; background:rgba(10,5,8,0.72);
    backdrop-filter:blur(10px) saturate(140%); -webkit-backdrop-filter:blur(10px) saturate(140%);
  }
  .access-gate[hidden]{ display:none; }
  .gate-card{
    width:100%; max-width:380px; background:var(--glass-2-bg); border:1px solid var(--glass-2-border);
    border-radius:var(--radius); padding:24px 20px; box-shadow:0 16px 40px rgba(0,0,0,0.4);
  }
  .gate-card h2{ font-family:'Space Grotesk', sans-serif; font-size:18px; font-weight:700; margin:0 0 6px; color:var(--paper); }
  .gate-card > p{ font-size:12.5px; line-height:1.6; color:var(--muted); margin:0 0 18px; }
  .gate-form{ display:flex; flex-direction:column; gap:12px; }
  .gate-form .field{ display:flex; flex-direction:column; gap:6px; }
  .gate-form label{ font-size:12px; font-weight:600; color:var(--gold-300); letter-spacing:0.01em; }
  .gate-form input, .gate-form select{
    width:100%; background:var(--ink-800); border:1px solid var(--ink-600);
    border-radius:10px; padding:11px 13px; color:var(--paper);
    font-family:'Inter', system-ui, sans-serif; font-size:13.5px; transition:.15s ease;
  }
  body.km .gate-form input, body.km .gate-form select{ font-family:'Noto Sans Khmer','Inter',system-ui,sans-serif; }
  .gate-form input:focus, .gate-form select:focus{ outline:none; border-color:var(--gold-500); }
  .gate-form select{ cursor:pointer; }
  .gate-submit{
    margin-top:4px; padding:12px 18px; border-radius:10px; border:none;
    background:linear-gradient(135deg, var(--gold-500), var(--gold-300));
    color:var(--ink-900); font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:14px; cursor:pointer; transition:.15s ease;
  }
  .gate-submit:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .gate-submit:disabled{ opacity:0.65; cursor:default; transform:none; }
  .gate-status{ font-size:12.5px; margin:2px 0 0; }
  .gate-status.bad{ color:#ffb3c2; font-weight:600; }
</style>
</head>
<body>

  <div class="access-gate" id="accessGate">
    <div class="gate-card">
      <h2 data-en="Register to Continue" data-km="ចុះឈ្មោះដើម្បីបន្ត">Register to Continue</h2>
      <p data-en="Fill in your details below to unlock News & Articles." data-km="សូមបំពេញព័ត៌មានខាងក្រោម ដើម្បីទទួលបានសិទ្ធិចូលមើលព័ត៌មាន និងអត្ថបទ។">Fill in your details below to unlock News & Articles.</p>
      <form class="gate-form" id="gateForm">
        <div class="field">
          <label data-en="Full Name" data-km="ឈ្មោះពេញ">Full Name</label>
          <input type="text" name="name" required>
        </div>
        <div class="field">
          <label data-en="Phone Number" data-km="លេខទូរស័ព្ទ">Phone Number</label>
          <input type="tel" name="phone" required>
        </div>
        <div class="field">
          <label data-en="Email" data-km="អ៊ីមែល">Email</label>
          <input type="email" name="email" required>
        </div>
        <div class="field">
          <label data-en="Trading Experience" data-km="បទពិសោធន៍ជួញដូរ">Trading Experience</label>
          <select name="experience" required>
            <option value="" disabled selected data-en="Select..." data-km="ជ្រើសរើស...">Select...</option>
            <option value="No experience" data-en="No experience" data-km="មិនទាន់មានបទពិសោធន៍">No experience</option>
            <option value="0-1 Year" data-en="0-1 Year" data-km="០-១ ឆ្នាំ">0-1 Year</option>
            <option value="1-3 Years" data-en="1-3 Years" data-km="១-៣ ឆ្នាំ">1-3 Years</option>
            <option value="3-5 Years" data-en="3-5 Years" data-km="៣-៥ ឆ្នាំ">3-5 Years</option>
            <option value="5+ Years" data-en="5+ Years" data-km="៥+ ឆ្នាំ">5+ Years</option>
          </select>
        </div>
        <button type="submit" class="gate-submit" data-en="Get Access" data-km="ទទួលសិទ្ធិចូលមើល">Get Access</button>
        <p class="gate-status" hidden></p>
      </form>
    </div>
  </div>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"><!-- filled from data.json --></div>
  </div>

  <div class="page">

    <div class="topbar">
      <a class="icon-btn back-btn" href="index.html" title="Back to home">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-en="Home" data-km="ទំព័រដើម">Home</span>
      </a>
      <div class="topbar-actions">
        <button class="icon-btn lang-btn" id="langBtn" title="Switch to Khmer">
          <span id="langLabel">EN</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="Switch to light theme">
          <svg viewBox="0 0 24 24" fill="none" id="themeIconMoon"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="none" id="themeIconSun" style="display:none;"><circle cx="12" cy="12" r="4.2" fill="currentColor"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn tag-fab" id="tagFabBtn" type="button" aria-haspopup="true" aria-expanded="false" title="Topic Selection">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="tagFabLabel" data-en="Topics" data-km="ប្រធានបទ">Topics</span>
        </button>
      </div>
    </div>

    <div class="hero">
      <div class="logo-mark">
        <img src="assets/mth-logo-white.png" alt="Meatika Trading logo" class="logo-img" id="pageLogoImg">
      </div>
      <h1 class="page-title" data-en="Learning Center" data-km="មជ្ឈមណ្ឌលសិក្សា">Learning Center</h1>
      <p data-en="Articles and videos on trading psychology, strategy, and market analysis from Meatika Trading." data-km="អត្ថបទ និងវីដេអូអំពីចិត្តវិទ្យាជួញដូរ យុទ្ធសាស្ត្រ និងការវិភាគទីផ្សារ ពី Meatika Trading។">Articles and videos on trading psychology, strategy, and market analysis from Meatika Trading.</p>
    </div>

    <div id="learningFormats" class="format-grid" aria-label="Learning formats"><!-- filled from data.json --></div>

    <div id="newsList"><!-- filled from data.json --></div>

    <div class="tag-drawer-backdrop" id="tagDrawerBackdrop"></div>
    <aside class="tag-drawer" id="tagDrawer" aria-hidden="true">
      <div class="tag-drawer-head">
        <span data-en="Topic Selection" data-km="ជ្រើសរើសអត្ថបទ">Topic Selection</span>
        <button class="tag-drawer-close" id="tagDrawerClose" type="button" aria-label="Close">✕</button>
      </div>
      <div class="tag-drawer-list" id="tagDrawerList">
        <button type="button" class="tag-item is-active" data-cat="all" data-en="All" data-km="ទាំងអស់">All</button>
        <!-- remaining tags are rendered from data.json's newsTags at load time -->
      </div>
    </aside>

    <footer data-en="Powered by Meatika Trading Network" data-km="ដំណើរការដោយបណ្តាញ Meatika Trading">Powered by Meatika Trading Network</footer>
  </div>

  <script src="assets/bg-animation.js" defer></script>
  <script src="assets/icons.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/news.js"></script>
  <script>
    /* ---- News & Articles access gate ----
       Visitors must submit this form once (per browser) before the News &
       Articles content is shown. Submissions are sent to a Google Apps
       Script Web App URL that logs each row into a Google Sheet — see
       news-signup-setup.md for the one-time setup steps.
       The endpoint is normally set from admin.html ("News & Articles access
       gate" panel, saved into data.json as newsGateEndpoint) and is read
       below once data.json loads. The hardcoded fallback here is only used
       if that field is left blank in the admin panel. */
    let NEWS_GATE_ENDPOINT = '';
    const NEWS_GATE_STORAGE_KEY = 'mth-news-access';

    const accessGate = document.getElementById('accessGate');
    const gateForm = document.getElementById('gateForm');
    const gateStatus = gateForm.querySelector('.gate-status');
    const gateSubmitBtn = gateForm.querySelector('.gate-submit');

    function isGateAppsScriptUrl(url){
      return /^https:\/\/script\.google(usercontent)?\.com\//i.test(url);
    }

    function openGate(){
      accessGate.hidden = false;
      document.body.classList.add('gate-open');
    }
    function closeGate(){
      accessGate.hidden = true;
      document.body.classList.remove('gate-open');
    }

    let hasAccess = false;
    try{ hasAccess = localStorage.getItem(NEWS_GATE_STORAGE_KEY) === 'granted'; }catch(e){ /* storage unavailable */ }
    if(hasAccess){ closeGate(); } else { openGate(); }

    gateForm.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const isKm = document.body.classList.contains('km');
      gateStatus.hidden = true;
      gateStatus.classList.remove('bad');

      if(!NEWS_GATE_ENDPOINT){
        gateStatus.textContent = isKm ? 'ទម្រង់នេះមិនទាន់បើកនៅឡើយទេ។ សូមព្យាយាមម្តងទៀតពេលក្រោយ។' : 'Registration isn\'t open yet. Please check back soon.';
        gateStatus.classList.add('bad');
        gateStatus.hidden = false;
        return;
      }

      gateSubmitBtn.disabled = true;
      const originalLabel = gateSubmitBtn.textContent;
      gateSubmitBtn.textContent = isKm ? 'កំពុងដាក់ស្នើ...' : 'Submitting...';

      const formData = new FormData(gateForm);
      formData.append('subject', 'New News & Articles access request — Meatika Trading');

      try{
        if(isGateAppsScriptUrl(NEWS_GATE_ENDPOINT)){
          // Apps Script Web App responses aren't readable via fetch (no-cors),
          // so treat "the request didn't throw" as success.
          await fetch(NEWS_GATE_ENDPOINT, { method: 'POST', mode: 'no-cors', body: formData });
        } else {
          const res = await fetch(NEWS_GATE_ENDPOINT, { method: 'POST', body: formData });
          if(!res.ok) throw new Error('Request failed');
        }
        try{ localStorage.setItem(NEWS_GATE_STORAGE_KEY, 'granted'); }catch(e){ /* storage unavailable */ }
        closeGate();
      }catch(err){
        gateStatus.textContent = isKm ? 'មានបញ្ហាកើតឡើង។ សូមព្យាយាមម្តងទៀត។' : 'Something went wrong. Please try again.';
        gateStatus.classList.add('bad');
        gateStatus.hidden = false;
      }finally{
        gateSubmitBtn.disabled = false;
        gateSubmitBtn.textContent = originalLabel;
      }
    });

    const langBtn = document.getElementById('langBtn');
    const langLabel = document.getElementById('langLabel');
    function applyLang(isKhmer){
      document.body.classList.toggle('km', isKhmer);
      document.documentElement.lang = isKhmer ? 'km' : 'en';
      langLabel.textContent = isKhmer ? 'ខ្មែរ' : 'EN';
      langBtn.title = isKhmer ? 'Switch to English' : 'Switch to Khmer';
      document.querySelectorAll('[data-en]').forEach(el=>{
        const en = el.getAttribute('data-en'), km = el.getAttribute('data-km');
        if(en) el.textContent = isKhmer ? (km || en) : en;
      });
    }
    let savedLang = true; // default language: Khmer, unless the visitor has chosen English before
    try{
      const storedLang = localStorage.getItem('mth-lang');
      if(storedLang) savedLang = storedLang === 'km';
    }catch(e){ /* storage unavailable */ }
    applyLang(savedLang);
    langBtn.addEventListener('click', ()=>{
      savedLang = !document.body.classList.contains('km');
      applyLang(savedLang);
      try{ localStorage.setItem('mth-lang', savedLang ? 'km' : 'en'); }catch(e){ /* storage unavailable */ }
    });

    const themeBtn = document.getElementById('themeBtn');
    const moonIcon = document.getElementById('themeIconMoon');
    const sunIcon = document.getElementById('themeIconSun');
    const pageLogoImg = document.getElementById('pageLogoImg');
    function applyTheme(isLight){
      document.body.classList.toggle('light', isLight);
      moonIcon.style.display = isLight ? 'none' : 'block';
      sunIcon.style.display = isLight ? 'block' : 'none';
      themeBtn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
      if(pageLogoImg) pageLogoImg.src = isLight ? 'assets/mth-logo.png' : 'assets/mth-logo-white.png';
    }
    let savedLight = false;
    try{ savedLight = localStorage.getItem('mth-theme') === 'light'; }catch(e){ /* storage unavailable */ }
    applyTheme(savedLight);
    themeBtn.addEventListener('click', ()=>{
      const nowLight = !document.body.classList.contains('light');
      applyTheme(nowLight);
      try{ localStorage.setItem('mth-theme', nowLight ? 'light' : 'dark'); }catch(e){ /* storage unavailable */ }
    });

    let CAT_TAB_IDS = ['all'];
    const PAGE_SIZE = 6;
    let allPublished = [];
    let activeCat = 'all';
    let currentPage = 1;
    let activeFormat = '';

    /* ---- Topic filter drawer ---- */
    const tagFabBtn = document.getElementById('tagFabBtn');
    const tagFabLabel = document.getElementById('tagFabLabel');
    const tagDrawer = document.getElementById('tagDrawer');
    const tagDrawerBackdrop = document.getElementById('tagDrawerBackdrop');
    const tagDrawerClose = document.getElementById('tagDrawerClose');

    function openTagDrawer(){
      tagDrawer.classList.add('is-open');
      tagDrawerBackdrop.classList.add('is-open');
      tagDrawer.setAttribute('aria-hidden', 'false');
      tagFabBtn.setAttribute('aria-expanded', 'true');
    }
    function closeTagDrawer(){
      tagDrawer.classList.remove('is-open');
      tagDrawerBackdrop.classList.remove('is-open');
      tagDrawer.setAttribute('aria-hidden', 'true');
      tagFabBtn.setAttribute('aria-expanded', 'false');
    }
    tagFabBtn.addEventListener('click', () => {
      if(tagDrawer.classList.contains('is-open')) closeTagDrawer(); else openTagDrawer();
    });
    tagDrawerClose.addEventListener('click', closeTagDrawer);
    tagDrawerBackdrop.addEventListener('click', closeTagDrawer);

    function buildPagerHtml(page, totalPages){
      let items = '';
      for(let p = 1; p <= totalPages; p++){
        items += `<button type="button" class="page-btn${p === page ? ' is-active' : ''}" data-page="${p}">${p}</button>`;
      }
      return `<div class="news-pager">${items}</div>`;
    }

    function renderNewsList(){
      const byTag = MTHNews.newsByCategory(allPublished, activeCat);
      const filtered = activeFormat ? byTag.filter(item => MTHNews.formatInfo(item).label.toLowerCase() === activeFormat) : byTag;
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if(currentPage > totalPages) currentPage = totalPages;
      if(currentPage < 1) currentPage = 1;
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      const listHtml = MTHNews.newsListHtml(pageItems);
      const pagerHtml = totalPages > 1 ? buildPagerHtml(currentPage, totalPages) : '';
      document.getElementById('newsList').innerHTML = listHtml + pagerHtml;

      document.querySelectorAll('.news-pager .page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page, 10) || 1;
          renderNewsList();
          document.querySelector('.hero').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      const activeInfo = activeCat === 'all' ? null : MTHNews.categoryInfo(activeCat);
      tagFabLabel.setAttribute('data-en', activeInfo ? activeInfo.en : 'Topics');
      tagFabLabel.setAttribute('data-km', activeInfo ? activeInfo.km : 'ប្រធានបទ');

      MTHSite.initReveal();
      applyLang(savedLang);
    }

    function bindTagItem(btn){
      btn.classList.toggle('is-active', btn.dataset.cat === activeCat);
      btn.addEventListener('click', () => {
        activeCat = btn.dataset.cat;
        currentPage = 1;
        document.querySelectorAll('.tag-item').forEach(b => b.classList.toggle('is-active', b === btn));
        try{ history.replaceState(null, '', activeCat === 'all' ? (location.pathname + location.search) : '#' + activeCat); }catch(e){ /* ignore */ }
        renderNewsList();
        closeTagDrawer();
      });
    }

    /* Builds the "All" + one button per Learning Center tag from data.json,
       so newly created/renamed/deleted tags (managed in the admin panel)
       show up here without any code change. */
    function renderTagDrawer(tags){
      const list = document.getElementById('tagDrawerList');
      list.innerHTML = '<button type="button" class="tag-item" data-cat="all" data-en="All" data-km="ទាំងអស់">All</button>' +
        (tags || []).map(t => `<button type="button" class="tag-item" data-cat="${MTHSite.escapeHtml(t.id)}" data-en="${MTHSite.escapeHtml(t.en)}" data-km="${MTHSite.escapeHtml(t.km || t.en)}">${MTHSite.escapeHtml(t.en)}</button>`).join('');
      CAT_TAB_IDS = ['all'].concat((tags || []).map(t => t.id));
      try{
        const fromHash = (location.hash || '').replace('#', '');
        if(CAT_TAB_IDS.includes(fromHash)) activeCat = fromHash;
      }catch(e){ /* ignore */ }
      list.querySelectorAll('.tag-item').forEach(bindTagItem);
    }

    function renderLearningFormats(formats){
      const wrap = document.getElementById('learningFormats');
      wrap.innerHTML = (formats || []).map(item => {
        const title = (item.title && item.title.en) || item.id;
        const titleKm = (item.title && item.title.km) || title;
        const desc = (item.desc && item.desc.en) || '';
        const descKm = (item.desc && item.desc.km) || desc;
        const icon = window.mthIconSvg ? window.mthIconSvg(item.icon, item.iconColor || '#fff') : '';
        return `<a class="format-card" href="news.html?format=${encodeURIComponent(item.id)}"><span class="format-icon" style="background:${MTHSite.escapeHtml(item.color || '#7a1640')}"><svg viewBox="0 0 24 24" fill="none">${icon}</svg></span><h2 data-en="${MTHSite.escapeHtml(title)}" data-km="${MTHSite.escapeHtml(titleKm)}">${MTHSite.escapeHtml(title)}</h2><p data-en="${MTHSite.escapeHtml(desc)}" data-km="${MTHSite.escapeHtml(descKm)}">${MTHSite.escapeHtml(desc)}</p></a>`;
      }).join('');
    }

    async function init(){
      let data;
      try{
        data = await MTHSite.loadData();
      }catch(e){
        document.getElementById('newsList').innerHTML = '<p class="not-found">Content failed to load.</p>';
        return;
      }
      if(data.newsGateEndpoint) NEWS_GATE_ENDPOINT = data.newsGateEndpoint;
      MTHSite.renderTicker(document.getElementById('ticker'), data.ticker || []);
      MTHNews.setTags(data.newsTags);
      renderLearningFormats(data.learningFormats);
      try{
        const requested = new URLSearchParams(location.search).get('format') || '';
        activeFormat = ['article','video','audio','book'].includes(requested) ? requested : '';
      }catch(e){ /* ignore */ }
      renderTagDrawer(MTHNews.getTags());
      allPublished = MTHNews.publishedNews(data);
      renderNewsList();
      applyLang(savedLang);
    }
    init();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meatika Trading</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#0a0508;
    --ink-800:#1c1116;
    --ink-700:#2a1b21;
    --ink-600:#4a2a35;
    --bg-grad-end:#2b0313;
    --gold-500:#ff2f5f;
    --gold-300:#ff8fa8;
    --green-500:#c9b3ba;
    --green-300:#efe3e6;
    --up:#ff5577;
    --paper:#f5eef0;
    --muted:#b99aa3;
    --radius:16px;
    --maxw:480px;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
    --glass-1-border:rgba(255,255,255,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(255,30,80,0.40), rgba(90,8,32,0.30));
    --glass-2-border:rgba(255,70,110,0.45);
    --glass-3-bg:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
    --glass-3-border:rgba(255,255,255,0.22);
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body.light{
    --ink-900:#fdf3f5;
    --ink-800:#ffffff;
    --ink-700:#fbeef1;
    --ink-600:#f0d3da;
    --bg-grad-end:#fdf3f5;
    --paper:#2a0f16;
    --muted:#8a6670;
    --gold-300:#c81b4a;
    --green-500:#8a6670;
    --green-300:#5c3c44;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
    --glass-1-border:rgba(42,15,22,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(255,30,85,0.16), rgba(255,30,85,0.06));
    --glass-2-border:rgba(200,27,74,0.35);
    --glass-3-bg:linear-gradient(135deg, rgba(230,205,210,0.55), rgba(255,255,255,0.30));
    --glass-3-border:rgba(42,15,22,0.14);
  }
  body{
    background:
      radial-gradient(circle at 20% -10%, rgba(255,20,80,0.20), transparent 45%),
      radial-gradient(circle at 100% 15%, rgba(255,60,110,0.14), transparent 42%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 32px),
      linear-gradient(180deg, var(--ink-900) 0%, var(--bg-grad-end) 100%);
    color:var(--paper);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  body.km, body.km *{
    font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif !important;
  }
  ::selection{background:var(--gold-500); color:var(--ink-900);}

  .ticker-wrap{
    width:100%;
    background:var(--ink-800);
    border-bottom:1px solid var(--ink-600);
    overflow:hidden;
    white-space:nowrap;
    padding:8px 0;
  }
  .ticker{
    display:inline-flex;
    animation:scroll 28s linear infinite;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.02em;
  }
  .ticker span{ padding:0 22px; color:var(--muted); display:inline-flex; align-items:center; gap:8px; }
  .ticker span b{ color:var(--gold-300); font-weight:600; }
  .ticker .up{ color:var(--up); }
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .ticker{ animation:none; } }

  /* ---- Page load + scroll-reveal animations ---- */
  @keyframes mthPageIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  body{ animation:mthPageIn .6s cubic-bezier(.16,1,.3,1) both; }
  .reveal{
    opacity:0;
    transform:translateY(26px) scale(.97);
    transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    will-change:opacity, transform;
  }
  .reveal.is-visible{ opacity:1; transform:translateY(0) scale(1); }
  @media (prefers-reduced-motion: reduce){
    body{ animation:none; }
    .reveal, .reveal.is-visible{ opacity:1 !important; transform:none !important; transition:none !important; }
  }

  .page{
    width:100%;
    max-width:var(--maxw);
    padding:22px 18px 40px;
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:26px;
  }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:34px; height:34px; border-radius:10px;
    background:var(--ink-800); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.15s ease; text-decoration:none;
  }
  .icon-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .icon-btn svg{ width:16px; height:16px; }
  .lang-btn{ width:auto; padding:0 9px; font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:0.03em; }
  .back-btn{ width:auto; padding:0 12px; gap:6px; font-size:12.5px; font-weight:600; }

  .hero{ text-align:center; margin-bottom:30px; }
  .logo-mark{
    width:100%; max-width:200px; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
    padding:8px;
    background:radial-gradient(circle, rgba(255,45,95,0.18), transparent 70%);
    border-radius:16px;
  }
  .logo-img{ width:100%; height:auto; display:block; filter:drop-shadow(0 6px 18px rgba(255,45,95,0.30)); }
  .page-title{
    font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700;
    margin:0 0 10px; color:var(--paper);
  }
  .hero p{
    color:var(--muted); font-size:13.5px; line-height:1.6;
    margin:0 auto; max-width:340px;
  }

  .section{ margin-bottom:28px; }
  .section-label{
    display:flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px; font-weight:600; letter-spacing:0.12em;
    color:var(--gold-300); text-transform:uppercase;
    margin-bottom:12px;
  }
  .section-label::after{
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, var(--ink-600), transparent);
  }

  .cards{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  body.view-list .cards{ grid-template-columns:1fr; }

  .card{
    background:var(--glass-1-bg);
    border:1px solid var(--glass-1-border);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.22);
    transition:.18s ease;
    display:flex; flex-direction:column; gap:10px;
  }
  .cards .card:nth-child(3n+2){ background:var(--glass-2-bg); border-color:var(--glass-2-border); }
  .cards .card:nth-child(3n){ background:var(--glass-3-bg); border-color:var(--glass-3-border); }
  .card:hover{ border-color:var(--gold-500); transform:translateY(-2px); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
  body.view-list .card{ flex-direction:row; align-items:flex-start; gap:12px; }

  .avatar{
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .avatar svg{ width:19px; height:19px; }

  .card-body{ flex:1; min-width:0; }
  .card-body h3{
    font-family:'Space Grotesk', sans-serif;
    font-size:14.5px; font-weight:600; margin:0 0 4px; color:var(--paper);
  }
  .card-body p{
    font-size:12px; color:var(--muted); line-height:1.5; margin:0;
  }

  .card-actions{ display:flex; gap:8px; margin-top:2px; }
  body.view-list .card-actions{ margin-top:6px; }
  .card-actions button, .card-actions a{
    width:28px; height:28px; border-radius:8px;
    background:var(--ink-700); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    cursor:pointer; text-decoration:none; transition:.15s ease;
  }
  .card-actions a:hover{ color:var(--green-300); border-color:var(--green-500); }
  .card-actions svg{ width:13px; height:13px; }

  .card.wide{ grid-column:1 / -1; flex-direction:row; align-items:flex-start; }

  footer{
    text-align:center; margin-top:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.08em;
    color:var(--ink-600); text-transform:uppercase;
  }

  .not-found{ text-align:center; color:var(--muted); font-size:13.5px; padding:40px 10px; }

  .section[hidden]{ display:none; }

  /* ---- Page content blocks (photo / video / text) ---- */
  #blocks{ margin-bottom:8px; }
  #blocks:empty{ margin-bottom:0; }
  .block{ margin-bottom:22px; }
  .block-heading{ font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:700; color:var(--paper); margin:0 0 10px; }
  .block-text{ color:var(--paper); font-size:14.5px; line-height:1.75; }
  .block-text p{ margin:0 0 14px; }
  .block-text p:last-child{ margin-bottom:0; }
  .block-photo{ margin:0; }
  .block-photo img{ width:100%; display:block; border-radius:var(--radius); border:1px solid var(--ink-600); background:var(--ink-800); }
  .block-caption{ font-size:12px; color:var(--muted); margin:8px 0 0; line-height:1.5; }
  .block-video{ position:relative; width:100%; aspect-ratio:16/9; border-radius:var(--radius); overflow:hidden; background:#000; border:1px solid var(--ink-600); }
  .block-video iframe, .block-video video{ width:100%; height:100%; border:0; display:block; }
  .block-video-link a{ color:var(--gold-300); font-weight:600; text-decoration:none; }

  /* ---- Registration / lead-capture form block ---- */
  .block-form .block-text{ color:var(--muted); font-size:13.5px; line-height:1.7; margin-bottom:16px; }
  .block-form .block-text p{ margin:0 0 12px; }
  .block-form .block-text p:last-child{ margin-bottom:0; }
  .reg-form{ display:flex; flex-direction:column; gap:12px; }
  .reg-form .field{ display:flex; flex-direction:column; gap:6px; }
  .reg-form label{ font-size:12px; font-weight:600; color:var(--gold-300); letter-spacing:0.01em; }
  .reg-form input, .reg-form textarea{
    width:100%; background:var(--ink-800); border:1px solid var(--ink-600);
    border-radius:10px; padding:11px 13px; color:var(--paper);
    font-family:'Inter', system-ui, sans-serif; font-size:13.5px;
    transition:.15s ease;
  }
  body.km .reg-form input, body.km .reg-form textarea{ font-family:'Noto Sans Khmer','Inter',system-ui,sans-serif; }
  .reg-form input:focus, .reg-form textarea:focus{ outline:none; border-color:var(--gold-500); }
  .reg-form textarea{ resize:vertical; min-height:70px; }
  .reg-form input[type="file"]{
    padding:9px 10px; font-size:12.5px; color:var(--muted); cursor:pointer;
  }
  .reg-form input[type="file"]::file-selector-button{
    margin-right:10px; padding:7px 12px; border:none; border-radius:7px;
    background:linear-gradient(135deg, var(--gold-500), var(--gold-300));
    color:var(--ink-900); font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:12px; cursor:pointer; transition:.15s ease;
  }
  .reg-form input[type="file"]::file-selector-button:hover{ filter:brightness(1.06); }
  .field-hint{ margin:0; font-size:11.5px; line-height:1.5; color:var(--muted); }
  .reg-submit{
    margin-top:4px; padding:12px 18px; border-radius:10px; border:none;
    background:linear-gradient(135deg, var(--gold-500), var(--gold-300));
    color:var(--ink-900); font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:14px; cursor:pointer; transition:.15s ease;
  }
  .reg-submit:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .reg-submit:disabled{ opacity:0.65; cursor:default; transform:none; }
  .form-status{ font-size:13px; margin:4px 0 0; }
  .form-status.ok{ color:var(--gold-300); font-weight:600; }
  .form-status.bad{ color:#e77; font-weight:600; }
  .form-privacy{ margin-top:14px; }
  .reg-form .field:has(label[data-en="Short Message"]),
  .reg-form .field:has(label[data-en="Registration Screenshot"]){ display:none; }
  .registration-step{
    margin:0 0 18px; padding:18px; border:1px solid var(--glass-2-border);
    border-radius:14px; background:var(--glass-2-bg);
  }
  .step-heading{ display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; }
  .step-number{
    width:28px; height:28px; flex:0 0 28px; display:grid; place-items:center;
    border-radius:50%; background:var(--gold-500); color:var(--ink-900);
    font-family:'Space Grotesk',sans-serif; font-weight:700;
  }
  .step-heading h3{ margin:1px 0 5px; color:var(--paper); font-size:16px; }
  .step-heading p{ margin:0; color:var(--muted); font-size:13px; line-height:1.6; }
  .step-actions{ display:flex; flex-wrap:wrap; gap:9px; }
  .step-button{
    padding:11px 14px; border:0; border-radius:9px; font:700 13px 'Space Grotesk',sans-serif;
    text-decoration:none; cursor:pointer; display:inline-flex; justify-content:center; align-items:center;
  }
  .step-button.primary, .reg-submit{ background:linear-gradient(135deg,var(--gold-500),var(--gold-300)); color:var(--ink-900); }
  .step-button.secondary{ background:transparent; color:var(--gold-300); border:1px solid var(--gold-500); }
  .telegram-button{ width:100%; background:#229ED9; color:#fff; }
  .step-button:hover{ filter:brightness(1.06); transform:translateY(-1px); }

  /* ---- Referral / affiliate link block (shown above the reg form) ---- */
  .block-referral{
    background:var(--glass-2-bg); border:1px solid var(--glass-2-border);
    border-radius:12px; padding:14px; margin-bottom:16px;
    display:flex; flex-direction:column; gap:10px;
  }
  .referral-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .referral-tag{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; font-weight:600;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--gold-300);
    background:rgba(255,255,255,0.08); border:1px solid var(--glass-1-border);
    padding:3px 8px; border-radius:6px; flex-shrink:0;
  }
  .referral-broker{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:15px; color:var(--paper); }
  .referral-link-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .referral-register-btn{
    flex:1 1 100%; padding:11px 16px; border-radius:8px; border:none;
    background:linear-gradient(135deg, var(--gold-500), var(--gold-300));
    color:var(--ink-900); font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:13px; cursor:pointer; transition:.15s ease; text-decoration:none;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .referral-register-btn:hover{ filter:brightness(1.06); transform:translateY(-1px); }
  .referral-hint{ margin:0; font-size:12px; line-height:1.6; color:var(--muted); }

  /* Simple bilingual show/hide: applyLang() toggles body.km, and these
     rules follow suit without any extra JS per block. */
  .i18n-km{ display:none; }
  body.km .i18n-en{ display:none; }
  body.km .i18n-km{ display:block; }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"><!-- filled from data.json --></div>
  </div>

  <div class="page">

    <div class="topbar">
      <a class="icon-btn back-btn" href="index.html" title="Back to home">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-en="Home" data-km="ទំព័រដើម">Home</span>
      </a>
      <div class="topbar-actions">
        <a class="icon-btn" href="news.html" title="Learning Center">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 5h13v14H4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M17 9h3v9a2 2 0 0 1-2 2H6" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M7 8.5h7M7 12h7M7 15.5h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </a>
        <button class="icon-btn lang-btn" id="langBtn" title="Switch to Khmer">
          <span id="langLabel">EN</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="Switch to light theme">
          <svg viewBox="0 0 24 24" fill="none" id="themeIconMoon"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="none" id="themeIconSun" style="display:none;"><circle cx="12" cy="12" r="4.2" fill="currentColor"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="hero">
      <div class="logo-mark">
        <img src="assets/mth-logo-white.png" alt="Meatika Trading logo" class="logo-img" id="logoImg">
      </div>
      <h1 class="page-title" id="pageTitle">Loading…</h1>
      <p id="heroText" data-en="" data-km=""></p>
    </div>

    <div id="blocks"><!-- photo/video/text content blocks filled from data.json --></div>

    <div id="sections"><!-- sections + cards filled from data.json --></div>

    <footer data-en="Powered by Meatika Trading Network" data-km="ដំណើរការដោយបណ្តាញ Meatika Trading">Powered by Meatika Trading Network</footer>
  </div>

  <script src="assets/bg-animation.js" defer></script>
  <script src="assets/icons.js"></script>
  <script src="assets/site.js"></script>
  <script>
    const langBtn = document.getElementById('langBtn');
    const langLabel = document.getElementById('langLabel');
    function applyLang(isKhmer){
      document.body.classList.toggle('km', isKhmer);
      document.documentElement.lang = isKhmer ? 'km' : 'en';
      langLabel.textContent = isKhmer ? 'ខ្មែរ' : 'EN';
      langBtn.title = isKhmer ? 'Switch to English' : 'Switch to Khmer';
      document.querySelectorAll('[data-en]').forEach(el=>{
        const en = el.getAttribute('data-en'), km = el.getAttribute('data-km');
        if(en) el.textContent = isKhmer ? (km || en) : en;
      });
    }
    let savedLang = true; // default language: Khmer, unless the visitor has chosen English before
    try{
      const storedLang = localStorage.getItem('mth-lang');
      if(storedLang) savedLang = storedLang === 'km';
    }catch(e){ /* storage unavailable */ }
    langBtn.addEventListener('click', ()=>{
      savedLang = !document.body.classList.contains('km');
      applyLang(savedLang);
      try{ localStorage.setItem('mth-lang', savedLang ? 'km' : 'en'); }catch(e){ /* storage unavailable */ }
    });

    const themeBtn = document.getElementById('themeBtn');
    const moonIcon = document.getElementById('themeIconMoon');
    const sunIcon = document.getElementById('themeIconSun');
    const logoImg = document.getElementById('logoImg');
    function applyTheme(isLight){
      document.body.classList.toggle('light', isLight);
      moonIcon.style.display = isLight ? 'none' : 'block';
      sunIcon.style.display = isLight ? 'block' : 'none';
      themeBtn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
      logoImg.src = isLight ? 'assets/mth-logo.png' : 'assets/mth-logo-white.png';
    }
    let savedLight = false;
    try{ savedLight = localStorage.getItem('mth-theme') === 'light'; }catch(e){ /* storage unavailable */ }
    applyTheme(savedLight);
    themeBtn.addEventListener('click', ()=>{
      const nowLight = !document.body.classList.contains('light');
      applyTheme(nowLight);
      try{ localStorage.setItem('mth-theme', nowLight ? 'light' : 'dark'); }catch(e){ /* storage unavailable */ }
    });

    async function init(){
      const params = new URLSearchParams(location.search);
      const pageId = params.get('id');

      let data;
      try{
        data = await MTHSite.loadData();
      }catch(e){
        document.getElementById('sections').innerHTML = '<p class="not-found">Content failed to load.</p>';
        return;
      }

      MTHSite.renderTicker(document.getElementById('ticker'), data.ticker || []);

      const page = pageId ? MTHSite.findPage(data, pageId) : null;
      if(!page){
        document.getElementById('pageTitle').textContent = 'Page not found';
        document.getElementById('heroText').style.display = 'none';
        document.getElementById('sections').innerHTML = '<p class="not-found" data-en="This page doesn\'t exist or may have been removed." data-km="ទំព័រនេះមិនមាន ឬប្រហែលជាត្រូវបានលុបចោល។">This page doesn\'t exist or may have been removed.</p>';
        applyLang(savedLang);
        return;
      }

      document.title = (page.title && page.title.en ? page.title.en : 'Page') + ' — Meatika Trading';

      const titleEl = document.getElementById('pageTitle');
      titleEl.setAttribute('data-en', (page.title && page.title.en) || '');
      titleEl.setAttribute('data-km', (page.title && page.title.km) || (page.title && page.title.en) || '');
      titleEl.textContent = (page.title && page.title.en) || '';

      const heroEl = document.getElementById('heroText');
      const heroText = page.hero || {};
      if(heroText.en){
        heroEl.setAttribute('data-en', heroText.en);
        heroEl.setAttribute('data-km', heroText.km || heroText.en);
        heroEl.textContent = heroText.en;
      } else {
        heroEl.style.display = 'none';
      }

      document.getElementById('blocks').innerHTML = MTHSite.blocksHtml(page.blocks || []);
      document.getElementById('sections').innerHTML = MTHSite.sectionsHtml(page.sections || []);
      MTHSite.wireForms();
      MTHSite.initReveal();

      applyLang(savedLang);
    }
    init();
  </script>

</body>
</html>

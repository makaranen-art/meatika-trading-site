<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meatika Trading</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#05070f;
    --ink-800:#0b0f1e;
    --ink-700:#0f1526;
    --ink-600:#253052;
    --bg-grad-end:#080b16;
    --gold-500:#4c7fff;
    --gold-300:#7fc4ff;
    --green-500:#84b6ff;
    --green-300:#d7e7ff;
    --up:#6fa9ff;
    --paper:#f2f5fc;
    --muted:#8d96b3;
    --radius:16px;
    --maxw:480px;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
    --glass-1-border:rgba(255,255,255,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(76,127,255,0.28), rgba(15,21,38,0.72));
    --glass-2-border:rgba(127,196,255,0.35);
    --glass-3-bg:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
    --glass-3-border:rgba(255,255,255,0.22);
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body.light{
    --ink-900:#f4f7ff;
    --ink-800:#ffffff;
    --ink-700:#edf2ff;
    --ink-600:#d6e1f7;
    --bg-grad-end:#f4f7ff;
    --paper:#11182b;
    --muted:#59647c;
    --gold-300:#2457bd;
    --green-500:#59647c;
    --green-300:#33415f;
    --glass-1-bg:linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
    --glass-1-border:rgba(17,24,43,0.10);
    --glass-2-bg:linear-gradient(135deg, rgba(76,127,255,0.16), rgba(127,196,255,0.06));
    --glass-2-border:rgba(76,127,255,0.35);
    --glass-3-bg:linear-gradient(135deg, rgba(214,225,247,0.55), rgba(255,255,255,0.30));
    --glass-3-border:rgba(17,24,43,0.14);
  }
  body{
    background:
      radial-gradient(circle at 20% -10%, rgba(76,127,255,0.25), transparent 45%),
      radial-gradient(circle at 100% 15%, rgba(127,196,255,0.16), transparent 42%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 32px),
      linear-gradient(180deg, var(--ink-900) 0%, var(--bg-grad-end) 100%);
    color:var(--paper);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  body.km, body.km *{
    font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif !important;
  }
  ::selection{background:var(--gold-500); color:var(--ink-900);}

  /* ---- Ticker tape (signature element) ---- */
  .ticker-wrap{
    width:100%;
    background:var(--ink-800);
    border-bottom:1px solid var(--ink-600);
    overflow:hidden;
    white-space:nowrap;
    padding:8px 0;
  }
  .ticker{
    display:inline-flex;
    animation:scroll 28s linear infinite;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.02em;
  }
  .ticker span{ padding:0 22px; color:var(--muted); display:inline-flex; align-items:center; gap:8px; }
  .ticker span b{ color:var(--gold-300); font-weight:600; }
  .ticker .up{ color:var(--up); }
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .ticker{ animation:none; } }

  /* ---- Page load + scroll-reveal animations ---- */
  @keyframes mthPageIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  body{ animation:mthPageIn .6s cubic-bezier(.16,1,.3,1) both; }
  .reveal{
    opacity:0;
    transform:translateY(26px) scale(.97);
    transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    will-change:opacity, transform;
  }
  .reveal.is-visible{ opacity:1; transform:translateY(0) scale(1); }
  @media (prefers-reduced-motion: reduce){
    body{ animation:none; }
    .reveal, .reveal.is-visible{ opacity:1 !important; transform:none !important; transition:none !important; }
  }

  .page{
    width:100%;
    max-width:var(--maxw);
    padding:22px 18px 40px;
  }

  /* ---- Top bar ---- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:26px;
  }
  .topbar-actions{ display:flex; gap:8px; }
  .icon-btn{
    width:34px; height:34px; border-radius:10px;
    background:var(--ink-800); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.15s ease;
  }
  .icon-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .icon-btn.active{ background:var(--gold-500); border-color:var(--gold-500); color:var(--ink-900); }
  .icon-btn svg{ width:16px; height:16px; }
  .lang-btn{ width:auto; padding:0 9px; font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:0.03em; }

  /* ---- Hero ---- */
  .hero{ text-align:center; margin-bottom:34px; position:relative; }
  .logo-mark{
    width:100%; max-width:320px; margin:0 auto 14px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    padding:10px 8px;
    background:radial-gradient(circle, rgba(255,45,95,0.18), transparent 70%);
    border-radius:16px;
  }
  .logo-img{ width:100%; height:auto; display:block; filter:drop-shadow(0 6px 18px rgba(255,45,95,0.30)); }
  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
  .hero p{
    color:var(--muted); font-size:13.5px; line-height:1.6;
    margin:0 auto; max-width:320px;
  }

  /* ---- Section ---- */
  .section{ margin-bottom:28px; }
  .section-label{
    display:flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px; font-weight:600; letter-spacing:0.12em;
    color:var(--gold-300); text-transform:uppercase;
    margin-bottom:12px;
  }
  .section-label::after{
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg, var(--ink-600), transparent);
  }

  .cards{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  body.view-list .cards{ grid-template-columns:1fr; }

  .card{
    background:var(--glass-1-bg);
    border:1px solid var(--glass-1-border);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.22);
    transition:.18s ease;
    display:flex; flex-direction:column; gap:10px;
  }
  .cards .card:nth-child(3n+2){ background:var(--glass-2-bg); border-color:var(--glass-2-border); }
  .cards .card:nth-child(3n){ background:var(--glass-3-bg); border-color:var(--glass-3-border); }
  .card:hover{ border-color:var(--gold-500); transform:translateY(-2px); box-shadow:0 12px 30px rgba(0,0,0,0.3); }
  body.view-list .card{ flex-direction:row; align-items:flex-start; gap:12px; }

  .avatar{
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .avatar svg{ width:19px; height:19px; }
  .social-card{ position:relative; overflow:hidden; }
  .social-card::after{ content:''; position:absolute; width:92px; height:92px; right:-35px; bottom:-48px; border-radius:50%; background:var(--social-glow, rgba(255,255,255,.08)); filter:blur(4px); pointer-events:none; }
  .social-card .avatar{ box-shadow:0 7px 18px var(--social-shadow, rgba(0,0,0,.22)); }
  .platform-name{ display:block; margin:0 0 3px; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:600; letter-spacing:.09em; color:var(--social-accent, var(--gold-300)); text-transform:uppercase; }
  .platform-telegram{ --social-accent:#69c9f5; --social-glow:rgba(36,158,217,.22); --social-shadow:rgba(36,158,217,.35); }
  .platform-facebook{ --social-accent:#78a7ff; --social-glow:rgba(24,119,242,.20); --social-shadow:rgba(24,119,242,.35); }
  .platform-youtube{ --social-accent:#ff7676; --social-glow:rgba(255,0,0,.17); --social-shadow:rgba(255,0,0,.32); }
  .platform-tiktok{ --social-accent:#6ee8f0; --social-glow:rgba(238,29,82,.17); --social-shadow:rgba(0,242,234,.25); }
  .platform-instagram{ --social-accent:#ffa0bb; --social-glow:rgba(225,48,108,.20); --social-shadow:rgba(225,48,108,.35); }

  .card-body{ flex:1; min-width:0; }
  .card-body h3{
    font-family:'Space Grotesk', sans-serif;
    font-size:14.5px; font-weight:600; margin:0 0 4px; color:var(--paper);
  }
  .card-body p{
    font-size:12px; color:var(--muted); line-height:1.5; margin:0;
  }

  .card-actions{ display:flex; gap:8px; margin-top:2px; }
  body.view-list .card-actions{ margin-top:6px; }
  .card-actions button, .card-actions a{
    width:28px; height:28px; border-radius:8px;
    background:var(--ink-700); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    cursor:pointer; text-decoration:none; transition:.15s ease;
  }
  .card-actions a:hover{ color:var(--green-300); border-color:var(--green-500); }
  .card-actions svg{ width:13px; height:13px; }

  /* wide card for single-column standalone entries */
  .card.wide{ grid-column:1 / -1; flex-direction:row; align-items:flex-start; }

  footer{
    text-align:center; margin-top:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.08em;
    color:var(--ink-600); text-transform:uppercase;
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--gold-500); color:var(--ink-900); font-weight:600; font-size:13px;
    padding:10px 18px; border-radius:10px; opacity:0; pointer-events:none;
    transition:.25s ease; font-family:'Inter',sans-serif;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .section[hidden]{ display:none; }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"><!-- filled from data.json --></div>
  </div>

  <div class="page">

    <div class="topbar">
      <div class="topbar-actions">
        <button class="icon-btn lang-btn" id="langBtn" title="Switch to Khmer">
          <span id="langLabel">EN</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="Switch to light theme">
          <svg viewBox="0 0 24 24" fill="none" id="themeIconMoon"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="none" id="themeIconSun" style="display:none;"><circle cx="12" cy="12" r="4.2" fill="currentColor"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="topbar-actions">
        <a class="icon-btn" href="academy/index.html" title="Meatika Academy — Learning Center & Courses">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 4 2 9l10 5 8-4.2V15" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><path d="M6 11.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </a>
        <button class="icon-btn active" id="gridBtn" title="Grid view">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="listBtn" title="List view">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="3" rx="1.2" fill="currentColor"/><rect x="3" y="11" width="18" height="3" rx="1.2" fill="currentColor"/><rect x="3" y="17" width="18" height="3" rx="1.2" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="shareBtn" title="Share this page">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="18" cy="5" r="2.5" fill="currentColor"/><circle cx="6" cy="12" r="2.5" fill="currentColor"/><circle cx="18" cy="19" r="2.5" fill="currentColor"/><path d="M8.2 10.8 15.8 6.2M8.2 13.2l7.6 4.6" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <div class="hero">
      <div class="logo-mark">
        <img src="assets/mth-logo-white.png" alt="Meatika Trading logo" class="logo-img" id="logoImg">
      </div>
      <h1 class="sr-only">Meatika Trading</h1>
      <p id="heroText" data-en="" data-km="">Loading…</p>
    </div>

    <div id="sections"><!-- sections + cards filled from data.json --></div>

    <footer data-en="Powered by Meatika Trading Network" data-km="ដំណើរការដោយបណ្តាញ Meatika Trading">Powered by Meatika Trading Network</footer>
  </div>

  <div class="toast" id="toast">Link copied</div>

  <script src="assets/bg-animation.js" defer></script>
  <script src="assets/icons.js"></script>
  <script src="assets/site.js"></script>
  <script>
    const gridBtn = document.getElementById('gridBtn');
    const listBtn = document.getElementById('listBtn');
    gridBtn.addEventListener('click', ()=>{
      document.body.classList.remove('view-list');
      gridBtn.classList.add('active'); listBtn.classList.remove('active');
    });
    listBtn.addEventListener('click', ()=>{
      document.body.classList.add('view-list');
      listBtn.classList.add('active'); gridBtn.classList.remove('active');
    });

    const langBtn = document.getElementById('langBtn');
    const langLabel = document.getElementById('langLabel');
    function applyLang(isKhmer){
      document.body.classList.toggle('km', isKhmer);
      document.documentElement.lang = isKhmer ? 'km' : 'en';
      langLabel.textContent = isKhmer ? 'ខ្មែរ' : 'EN';
      langBtn.title = isKhmer ? 'Switch to English' : 'Switch to Khmer';
      document.querySelectorAll('[data-en]').forEach(el=>{
        const en = el.getAttribute('data-en'), km = el.getAttribute('data-km');
        if(en) el.textContent = isKhmer ? (km || en) : en;
      });
    }
    let savedLang = true; // default language: Khmer, unless the visitor has chosen English before
    try{
      const storedLang = localStorage.getItem('mth-lang');
      if(storedLang) savedLang = storedLang === 'km';
    }catch(e){ /* storage unavailable */ }
    langBtn.addEventListener('click', ()=>{
      savedLang = !document.body.classList.contains('km');
      applyLang(savedLang);
      try{ localStorage.setItem('mth-lang', savedLang ? 'km' : 'en'); }catch(e){ /* storage unavailable */ }
    });

    const themeBtn = document.getElementById('themeBtn');
    const moonIcon = document.getElementById('themeIconMoon');
    const sunIcon = document.getElementById('themeIconSun');
    const logoImg = document.getElementById('logoImg');
    function applyTheme(isLight){
      document.body.classList.toggle('light', isLight);
      moonIcon.style.display = isLight ? 'none' : 'block';
      sunIcon.style.display = isLight ? 'block' : 'none';
      themeBtn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
      logoImg.src = isLight ? 'assets/mth-logo.png' : 'assets/mth-logo-white.png';
    }
    let savedLight = false;
    try{ savedLight = localStorage.getItem('mth-theme') === 'light'; }catch(e){ /* storage unavailable */ }
    applyTheme(savedLight);
    themeBtn.addEventListener('click', ()=>{
      const nowLight = !document.body.classList.contains('light');
      applyTheme(nowLight);
      try{ localStorage.setItem('mth-theme', nowLight ? 'light' : 'dark'); }catch(e){ /* storage unavailable */ }
    });

    const shareBtn = document.getElementById('shareBtn');
    const toast = document.getElementById('toast');
    shareBtn.addEventListener('click', async ()=>{
      const shareData = { title:'Meatika Trading', text:'Forex & crypto partnership network', url: location.href };
      try{
        if(navigator.share){ await navigator.share(shareData); }
        else{
          await navigator.clipboard.writeText(location.href);
          showToast('Link copied');
        }
      }catch(e){ /* user cancelled share, ignore */ }
    });
    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(()=> toast.classList.remove('show'), 1800);
    }

    /* ---- Render everything from data.json (shared with page.html via assets/site.js) ---- */
    async function init(){
      let data;
      try{
        data = await MTHSite.loadData();
      }catch(e){
        document.getElementById('sections').innerHTML = '<p style="text-align:center;color:var(--muted);">Content failed to load.</p>';
        return;
      }

      MTHSite.renderTicker(document.getElementById('ticker'), data.ticker || []);

      const heroEl = document.getElementById('heroText');
      heroEl.setAttribute('data-en', data.hero.en);
      heroEl.setAttribute('data-km', data.hero.km || data.hero.en);
      heroEl.textContent = data.hero.en;

      document.getElementById('sections').innerHTML = MTHSite.sectionsHtml(data.sections || []);
      MTHSite.initReveal();

      applyLang(savedLang);
    }
    init();
  </script>

</body>
</html>

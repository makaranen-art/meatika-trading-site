<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meatika Trading — News</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta property="og:title" id="ogTitle" content="Meatika Trading News">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:type" content="article">
<style>
  :root{
    --ink-900:#1b2753; --ink-800:#3a4260; --ink-700:#454d6e; --ink-600:#565f82;
    --bg-grad-end:#2a1233; --gold-500:#d4af37; --gold-300:#f4d980;
    --green-500:#b9c1d1; --green-300:#dee2ea; --up:#ffb026;
    --paper:#f2f2f8; --muted:#a8b2cc; --radius:16px; --maxw:480px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body.light{
    --ink-900:#f7f4ec; --ink-800:#ffffff; --ink-700:#f1ede1; --ink-600:#e3ddca;
    --bg-grad-end:#f7f4ec; --paper:#1b2753; --muted:#5c6580;
    --gold-300:#9c7a1f; --green-500:#5b6577; --green-300:#414a5c;
  }
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(212,175,55,0.14), transparent 45%),
      radial-gradient(circle at 100% 20%, rgba(185,193,209,0.10), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 32px),
      linear-gradient(180deg, var(--ink-900) 0%, var(--bg-grad-end) 100%);
    color:var(--paper); font-family:'Inter', system-ui, sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  body.km, body.km *{ font-family:'Noto Sans Khmer', 'Inter', system-ui, sans-serif !important; }
  ::selection{ background:var(--gold-500); color:var(--ink-900); }

  .ticker-wrap{ width:100%; background:var(--ink-800); border-bottom:1px solid var(--ink-600); overflow:hidden; white-space:nowrap; padding:8px 0; }
  .ticker{ display:inline-flex; animation:scroll 28s linear infinite; font-family:'JetBrains Mono', monospace; font-size:12.5px; letter-spacing:0.02em; }
  .ticker span{ padding:0 22px; color:var(--muted); display:inline-flex; align-items:center; gap:8px; }
  .ticker span b{ color:var(--gold-300); font-weight:600; }
  .ticker .up{ color:var(--up); }
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .ticker{ animation:none; } }

  .page{ width:100%; max-width:var(--maxw); padding:22px 18px 40px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:34px; height:34px; border-radius:10px; background:var(--ink-800); border:1px solid var(--ink-600);
    color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s ease; text-decoration:none;
  }
  .icon-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); }
  .icon-btn svg{ width:16px; height:16px; }
  .lang-btn{ width:auto; padding:0 9px; font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:0.03em; }
  .back-btn{ width:auto; padding:0 12px; gap:6px; font-size:12.5px; font-weight:600; }

  .art-cover{ width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:var(--radius); border:1px solid var(--ink-600); margin-bottom:18px; background:var(--ink-800); }
  .art-meta{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .art-date{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--gold-300); letter-spacing:0.05em; }
  .art-draft-tag{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.06em; color:var(--ink-900); background:var(--gold-300); padding:2px 7px; border-radius:5px; font-weight:700; }
  .art-title{ font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700; margin:0 0 16px; line-height:1.35; }

  .news-video{ position:relative; width:100%; aspect-ratio:16/9; border-radius:var(--radius); overflow:hidden; margin-bottom:18px; background:#000; border:1px solid var(--ink-600); }
  .news-video iframe, .news-video video{ width:100%; height:100%; border:0; display:block; }
  .news-video-link{ margin-bottom:18px; }
  .news-video-link a{ color:var(--gold-300); font-weight:600; text-decoration:none; }

  .art-body{ color:var(--paper); font-size:14.5px; line-height:1.75; }
  .art-body p{ margin:0 0 16px; }
  .art-body p:last-child{ margin-bottom:0; }

  .share-panel{ margin-top:30px; padding-top:20px; border-top:1px solid var(--ink-600); }
  .share-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:0.1em;
    color:var(--gold-300); text-transform:uppercase; margin-bottom:12px;
  }
  .share-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .share-btn{
    display:flex; align-items:center; gap:7px; padding:9px 14px; border-radius:10px;
    background:var(--ink-800); border:1px solid var(--ink-600); color:var(--paper);
    text-decoration:none; font-size:12.5px; font-weight:600; transition:.15s ease;
  }
  .share-btn svg{ width:15px; height:15px; flex-shrink:0; }
  .share-btn:hover{ border-color:var(--gold-500); color:var(--gold-300); transform:translateY(-1px); }

  footer{ text-align:center; margin-top:30px; font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:0.08em; color:var(--ink-600); text-transform:uppercase; }
  .not-found{ text-align:center; color:var(--muted); font-size:13.5px; padding:40px 10px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--ink-800); border:1px solid var(--gold-500); color:var(--gold-300);
    padding:9px 16px; border-radius:10px; font-size:12.5px; opacity:0; pointer-events:none;
    transition:.2s ease; z-index:20;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"><!-- filled from data.json --></div>
  </div>

  <div class="page">

    <div class="topbar">
      <a class="icon-btn back-btn" href="news.html" title="Back to news">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-en="News" data-km="ព័ត៌មាន">News</span>
      </a>
      <div class="topbar-actions">
        <button class="icon-btn lang-btn" id="langBtn" title="Switch to Khmer">
          <span id="langLabel">EN</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="Switch to light theme">
          <svg viewBox="0 0 24 24" fill="none" id="themeIconMoon"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="none" id="themeIconSun" style="display:none;"><circle cx="12" cy="12" r="4.2" fill="currentColor"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div id="article"><!-- filled from data.json --></div>

    <footer data-en="Powered by Meatika Trading Network" data-km="ដំណើរការដោយបណ្តាញ Meatika Trading">Powered by Meatika Trading Network</footer>
  </div>

  <div class="toast" id="toast">Link copied</div>

  <script src="assets/icons.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/news.js"></script>
  <script>
    const langBtn = document.getElementById('langBtn');
    const langLabel = document.getElementById('langLabel');
    function applyLang(isKhmer){
      document.body.classList.toggle('km', isKhmer);
      document.documentElement.lang = isKhmer ? 'km' : 'en';
      langLabel.textContent = isKhmer ? 'ខ្មែរ' : 'EN';
      langBtn.title = isKhmer ? 'Switch to English' : 'Switch to Khmer';
      document.querySelectorAll('[data-en]').forEach(el=>{
        const en = el.getAttribute('data-en'), km = el.getAttribute('data-km');
        if(en) el.textContent = isKhmer ? (km || en) : en;
      });
    }
    let savedLang = false;
    try{ savedLang = localStorage.getItem('mth-lang') === 'km'; }catch(e){ /* storage unavailable */ }
    langBtn.addEventListener('click', ()=>{
      savedLang = !document.body.classList.contains('km');
      applyLang(savedLang);
      try{ localStorage.setItem('mth-lang', savedLang ? 'km' : 'en'); }catch(e){ /* storage unavailable */ }
    });

    const themeBtn = document.getElementById('themeBtn');
    const moonIcon = document.getElementById('themeIconMoon');
    const sunIcon = document.getElementById('themeIconSun');
    function applyTheme(isLight){
      document.body.classList.toggle('light', isLight);
      moonIcon.style.display = isLight ? 'none' : 'block';
      sunIcon.style.display = isLight ? 'block' : 'none';
      themeBtn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
    }
    let savedLight = false;
    try{ savedLight = localStorage.getItem('mth-theme') === 'light'; }catch(e){ /* storage unavailable */ }
    applyTheme(savedLight);
    themeBtn.addEventListener('click', ()=>{
      const nowLight = !document.body.classList.contains('light');
      applyTheme(nowLight);
      try{ localStorage.setItem('mth-theme', nowLight ? 'light' : 'dark'); }catch(e){ /* storage unavailable */ }
    });

    const toast = document.getElementById('toast');
    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(()=> toast.classList.remove('show'), 1800);
    }

    const SHARE_ICONS = {
      facebook: '<path d="M14 9.5h2.5V6.2c-.43-.06-1.9-.2-3.14-.2-3.11 0-5.14 1.9-5.14 5.36V14H5v3.6h3.22V27h3.9v-9.4h3.14L15.8 14h-3.68v-2.2c0-1.04.29-1.76 1.87-1.76Z" fill="currentColor"/>',
      telegram: '<path d="m3 12.7 20.6-7.9c.95-.36 1.78.23 1.47 1.66l-3.5 16.5c-.26 1.2-.98 1.5-1.98.93l-5.48-4.04-2.64 2.55c-.29.29-.54.54-1.1.54l.39-5.56 10.13-9.15c.44-.39-.1-.6-.68-.22L8.4 15.63l-5.35-1.67c-1.16-.36-1.18-1.16.24-1.72Z" fill="currentColor"/>',
      twitter: '<path d="M22.9 8.6c.01.2.01.4.01.6 0 6.1-4.6 13.1-13.1 13.1-2.6 0-5-.76-7-2.07.36.04.72.06 1.1.06 2.15 0 4.13-.73 5.7-1.97a4.6 4.6 0 0 1-4.3-3.2c.28.05.57.08.87.08.42 0 .83-.06 1.21-.16A4.6 4.6 0 0 1 3.7 10.9v-.06c.62.34 1.33.55 2.08.58a4.6 4.6 0 0 1-1.42-6.14 13.05 13.05 0 0 0 9.47 4.8 4.6 4.6 0 0 1 7.84-4.2 9.2 9.2 0 0 0 2.92-1.11 4.62 4.62 0 0 1-2.02 2.54 9.2 9.2 0 0 0 2.65-.72 9.35 9.35 0 0 1-2.32 2.4Z" fill="currentColor"/>',
      whatsapp: '<path d="M15.98 4C9.5 4 4.24 9.24 4.24 15.72c0 2.06.55 4.06 1.58 5.83L4 28l6.62-1.74a11.8 11.8 0 0 0 5.35 1.29h.01c6.48 0 11.74-5.24 11.74-11.72C27.72 9.24 22.46 4 15.98 4Zm0 21.4c-1.7 0-3.35-.46-4.8-1.32l-.34-.2-3.93 1.03 1.05-3.83-.22-.4a9.55 9.55 0 0 1-1.47-5.05c0-5.31 4.33-9.63 9.66-9.63 2.58 0 5 1 6.83 2.83a9.53 9.53 0 0 1 2.82 6.8c0 5.31-4.33 9.63-9.6 9.63Zm5.28-7.21c-.29-.14-1.7-.84-1.96-.93-.26-.1-.46-.14-.65.14-.2.29-.75.93-.92 1.12-.17.19-.34.22-.63.08-.29-.15-1.22-.45-2.32-1.43-.86-.76-1.44-1.7-1.6-1.99-.17-.29-.02-.44.13-.58.13-.13.29-.34.43-.5.15-.17.2-.29.29-.48.1-.19.05-.36-.02-.5-.08-.15-.66-1.58-.9-2.16-.24-.58-.48-.5-.65-.5-.17-.01-.36-.01-.56-.01-.19 0-.5.07-.77.36-.26.29-1 .98-1 2.4 0 1.4 1.03 2.77 1.17 2.96.14.19 2.03 3.1 4.92 4.35.69.3 1.22.47 1.64.6.69.22 1.32.19 1.82.11.55-.08 1.7-.7 1.94-1.36.24-.67.24-1.25.17-1.37-.07-.12-.26-.19-.55-.34Z" fill="currentColor"/>',
      link: '<path d="M9.5 12.5a4 4 0 0 1 0-5.66l2.83-2.83a4 4 0 1 1 5.66 5.66l-1.42 1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M18.5 15.5a4 4 0 0 1 0 5.66l-2.83 2.83a4 4 0 1 1-5.66-5.66l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
    };

    function renderShareButtons(url, title){
      const links = MTHNews.shareLinks(url, title);
      return `
        <div class="share-panel">
          <div class="share-label" data-en="Share this article" data-km="ចែករំលែកអត្ថបទនេះ">Share this article</div>
          <div class="share-row">
            <a class="share-btn" href="${links.facebook}" target="_blank" rel="noopener"><svg viewBox="0 0 28 28">${SHARE_ICONS.facebook}</svg>Facebook</a>
            <a class="share-btn" href="${links.telegram}" target="_blank" rel="noopener"><svg viewBox="0 0 28 28">${SHARE_ICONS.telegram}</svg>Telegram</a>
            <a class="share-btn" href="${links.twitter}" target="_blank" rel="noopener"><svg viewBox="0 0 28 28">${SHARE_ICONS.twitter}</svg>X</a>
            <a class="share-btn" href="${links.whatsapp}" target="_blank" rel="noopener"><svg viewBox="0 0 28 28">${SHARE_ICONS.whatsapp}</svg>WhatsApp</a>
            <button class="share-btn" id="copyLinkBtn" type="button"><svg viewBox="0 0 28 28">${SHARE_ICONS.link}</svg><span data-en="Copy link" data-km="ចម្លងតំណ">Copy link</span></button>
          </div>
        </div>`;
    }

    async function init(){
      const params = new URLSearchParams(location.search);
      const id = params.get('id');

      let data;
      try{
        data = await MTHSite.loadData();
      }catch(e){
        document.getElementById('article').innerHTML = '<p class="not-found">Content failed to load.</p>';
        return;
      }
      MTHSite.renderTicker(document.getElementById('ticker'), data.ticker || []);

      const article = id ? MTHNews.findNews(data, id) : null;
      const wrap = document.getElementById('article');

      if(!article){
        wrap.innerHTML = '<p class="not-found" data-en="This article doesn\'t exist or may have been removed." data-km="អត្ថបទនេះមិនមាន ឬប្រហែលជាត្រូវបានលុបចោល។">This article doesn\'t exist or may have been removed.</p>';
        applyLang(savedLang);
        return;
      }

      const title = (article.title && article.title.en) || 'Untitled';
      const titleKm = (article.title && article.title.km) || title;
      const excerpt = (article.excerpt && article.excerpt.en) || '';

      document.title = title + ' — Meatika Trading';
      document.getElementById('ogTitle').setAttribute('content', title);
      document.getElementById('ogDesc').setAttribute('content', excerpt);

      const draftTag = article.published === false ? '<span class="art-draft-tag">DRAFT — not listed publicly yet</span>' : '';
      const cover = article.cover ? `<img class="art-cover" src="${MTHSite.escapeHtml(article.cover)}" alt="">` : '';
      const video = MTHNews.videoEmbedHtml(article.video);
      const body = MTHNews.bodyHtml((article.body && article.body.en) || '');
      const bodyKm = MTHNews.bodyHtml((article.body && article.body.km) || (article.body && article.body.en) || '');

      wrap.innerHTML = `
        ${cover}
        <div class="art-meta">
          ${draftTag}
          <span class="art-date">${MTHSite.escapeHtml(MTHNews.formatDate(article.publishedAt))}</span>
        </div>
        <h1 class="art-title" data-en="${MTHSite.escapeHtml(title)}" data-km="${MTHSite.escapeHtml(titleKm)}">${MTHSite.escapeHtml(title)}</h1>
        ${video}
        <div class="art-body" id="artBody" data-en-html="1"></div>
        ${renderShareButtons(location.href, title)}
      `;

      const bodyEl = document.getElementById('artBody');
      bodyEl.dataset.enBody = body;
      bodyEl.dataset.kmBody = bodyKm;
      bodyEl.innerHTML = body;

      const copyBtn = document.getElementById('copyLinkBtn');
      if(copyBtn){
        copyBtn.addEventListener('click', async () => {
          try{
            await navigator.clipboard.writeText(location.href);
            showToast('Link copied');
          }catch(e){ /* clipboard unavailable */ }
        });
      }

      applyLangWithBody(savedLang);
    }

    /* Same as applyLang, but also swaps the article body (which is stored
       as rendered paragraph HTML per language, not a single data-en string). */
    function applyLangWithBody(isKhmer){
      applyLang(isKhmer);
      const bodyEl = document.getElementById('artBody');
      if(bodyEl){
        bodyEl.innerHTML = isKhmer ? (bodyEl.dataset.kmBody || bodyEl.dataset.enBody) : bodyEl.dataset.enBody;
      }
    }
    langBtn.addEventListener('click', () => applyLangWithBody(document.body.classList.contains('km')));

    init();
  </script>

</body>
</html>
